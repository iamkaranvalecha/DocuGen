<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tool Window</title>
    <script>
        function sendMessageToHost() {
            // This function sends a message from the WebView to the host (C# code).
            window.chrome.webview.postMessage("Button clicked from WebView!");
        }
    </script>
</head>
<body>
    <h1>Welcome to My Tool Window</h1>

    <!-- UI elements -->
    <select id="dropdown">
        <option value="option1">Option 1</option>
        <option value="option2">Option 2</option>
    </select>

    <button onclick="sendMessageToHost()">Click Me</button>

    <p id="message"></p>

    <script>
        // Listen for messages from C# host
        window.chrome.webview.addEventListener('message', event => {
            document.getElementById("message").innerText = event.data;
        });
    </script>
</body>
</html>
